name: tests

on:
  push:
    branches: [main, testing]
  pull_request:
  workflow_dispatch:

# A second push to the same branch cancels the first — no point paying for a run
# whose result is already stale.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    # Windows only, and not for portability's sake: `.pynifly/NiflyDLL.dll` is a
    # compiled Windows DLL, so the NIF layer cannot load anywhere else.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 leads because it is the PRODUCTION runtime, not a legacy floor:
        # the shipped exe is frozen from a 3.10 interpreter
        # (dist/CBBEtoUBE/_internal/python310.dll). Note pip resolves older
        # numpy/scipy on 3.10 (numpy 2.3+ and scipy 1.16+ dropped it) -- that is
        # a feature here, since it is closer to what the frozen build bundles
        # than the newest wheels are. Drop 3.10 only when the exe build moves.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Verify pynifly loads
        # The vendored DLL is the one dependency pip cannot supply. If it fails
        # to load, most of the suite fails in a confusing way — surface it here.
        run: python -c "import sys; sys.path.insert(0, '.pynifly'); from pyn import pynifly; print('pynifly OK')"

      - name: Run tests
        run: python -m pytest -q
